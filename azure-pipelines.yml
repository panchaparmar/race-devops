trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: race-devops
  dockerfilePath: Dockerfile
  tag: $(Build.BuildId)

stages:

#==========================
# Build Stage
#==========================

- stage: Build

  jobs:

  - job: BuildImage

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: ACR-ServiceConnection

    - task: Docker@2
      displayName: Build Image
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: Push Image
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: ACR-ServiceConnection
        tags: |
          $(tag)
          latest

#==========================
# Deploy Stage
#==========================

- stage: Deploy

  dependsOn: Build

  jobs:

  - deployment: DeployToAKS

    environment: Production

    strategy:

      runOnce:

        deploy:

          steps:

          - checkout: self

          - task: KubernetesManifest@1
            displayName: Deploy to AKS

            inputs:

              action: deploy

              kubernetesServiceConnection: Race_AKS

              manifests: |
                k8s/deployment.yaml
                k8s/service.yaml

              containers: |
                racedev.azurecr.io/race-devops:$(Build.BuildId)