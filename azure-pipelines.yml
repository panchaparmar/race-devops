# ============================================================
# Azure DevOps Pipeline — Build & Push to ACR
# ACR: racedev.azurecr.io
# ============================================================

trigger:
  branches:
    include:
      - beta
      - develop

pr:
  branches:
    include:
      - beta

variables:
  ACR_SERVICE_CONNECTION: 'racedev-acr-connection'   # ← Your Service Connection name
  ACR_NAME: 'racedev.azurecr.io'
  IMAGE_NAME: 'race-app'                             # ← Change to your image name
  IMAGE_TAG: '$(Build.BuildId)'

stages:
- stage: BuildAndPush
  displayName: '🐳 Build & Push to ACR'
  jobs:
  - job: Docker
    displayName: 'Docker Build & Push'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # Step 1 — Login to ACR
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: '$(ACR_SERVICE_CONNECTION)'

    # Step 2 — Build Docker Image
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: 'build'
        containerRegistry: '$(ACR_SERVICE_CONNECTION)'
        repository: '$(IMAGE_NAME)'
        dockerfile: 'Dockerfile'        # ← Path to your Dockerfile
        buildContext: '.'               # ← Repo root as build context
        tags: |
          $(IMAGE_TAG)
          latest

    # Step 3 — Push to ACR
    - task: Docker@2
      displayName: 'Push Image to ACR'
      inputs:
        command: 'push'
        containerRegistry: '$(ACR_SERVICE_CONNECTION)'
        repository: '$(IMAGE_NAME)'
        tags: |
          $(IMAGE_TAG)
          latest